name: Generate Field Brief

on:
  # Run Mon, Wed, Fri at 06:00 UTC (7:00 CET)
  schedule:
    - cron: '0 6 * * 1,3,5'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run AI content pipeline
        id: pipeline
        env:
          KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KOBO_ASSET_UID: ${{ secrets.KOBO_ASSET_UID }}
        run: node scripts/generate-brief.mjs

      - name: Check for new brief
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard src/content/briefs/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new brief generated"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New brief detected"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "CSIORS Pipeline"
          git config user.email "pipeline@csiors.org"
          git add src/content/briefs/
          git commit -m "Auto-generated brief: ${{ steps.pipeline.outputs.brief_title }}

          Generated by CSIORS AI Content Pipeline
          Source: KoboToolbox field data + DeepSeek AI synthesis"
          git push

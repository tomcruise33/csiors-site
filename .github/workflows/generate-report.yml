name: Generate Situational Report

on:
  # Manual trigger with optional country parameter
  workflow_dispatch:
    inputs:
      country:
        description: 'Target country (leave empty for auto-select based on eligibility)'
        required: false
        type: string

  # Signal from csiors-watchtower (B1.5)
  repository_dispatch:
    types: [generate-report]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate situational report
        id: report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_COUNTRY: ${{ github.event.inputs.country || github.event.client_payload.country || '' }}
        run: node scripts/generate-report.mjs --country "$REPORT_COUNTRY"

      - name: Check for new report
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard src/content/reports/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new report generated"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New report detected"
          fi

      - name: Create PR with report
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="report/${{ steps.report.outputs.report_country }}-$(date +%Y%m%d-%H%M)"
          git config user.name "CSIORS Pipeline"
          git config user.email "pipeline@csiors.org"
          git checkout -b "$BRANCH"
          git add src/content/reports/
          git commit -m "report: ${{ steps.report.outputs.report_title }}

          Generated by CSIORS Situational Report Pipeline
          Source: Watchtower field data + WFP cross-validation + DeepSeek synthesis
          Country: ${{ steps.report.outputs.report_country }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Report: ${{ steps.report.outputs.report_title }}" \
            --body "## Situational Report

          **Country:** ${{ steps.report.outputs.report_country }}
          **Generated:** $(date -u +%Y-%m-%d)

          This report was generated by the CSIORS pipeline from watchtower field data, cross-validated against WFP benchmarks.

          **Review before merging** — check for:
          - [ ] No country-level averages stated as facts
          - [ ] Claims attributed to specific respondents/locations
          - [ ] WFP benchmarks referenced where available
          - [ ] Limitations section present
          - [ ] Mandatory disclaimer included" \
            --label "auto-generated"
